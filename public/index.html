<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVASMS - VERCEL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .status {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 5px solid #667eea;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
        .online { color: #28a745; font-weight: bold; }
        .offline { color: #dc3545; font-weight: bold; }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-warning { background: #ffc107; color: black; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .log {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-entry { margin: 5px 0; border-bottom: 1px solid #333; padding: 5px; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
        }
        .footer { text-align: center; margin-top: 30px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 IVASMS VERCEL</h1>
        <div class="subtitle">100% Working API</div>
        
        <div class="status" id="status">
            <div class="status-item">
                <span>Server:</span>
                <span id="serverStatus" class="online">Checking...</span>
            </div>
            <div class="status-item">
                <span>Cookies:</span>
                <span id="cookieCount">0</span>
            </div>
            <div class="status-item">
                <span>SMS Terkirim:</span>
                <span id="smsSent">0</span>
            </div>
            <div class="status-item">
                <span>WIB:</span>
                <span id="wibTime">-</span>
            </div>
        </div>
        
        <div class="button-grid">
            <button class="btn btn-primary" onclick="showLoginModal()">🔐 Login</button>
            <button class="btn btn-success" onclick="pollSMS()">📨 Poll SMS</button>
            <button class="btn btn-info" onclick="checkStatus()">🔄 Refresh</button>
            <button class="btn btn-warning" onclick="showCookieModal()">🍪 Set Cookie</button>
        </div>
        
        <div class="log" id="log">
            <div class="log-entry">System ready. Click buttons to start.</div>
        </div>
        
        <div class="footer">Powered by Himmel Bot | Telegram: @admin</div>
    </div>
    
    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h3>🔐 Login IVASMS</h3>
            <input type="email" id="email" placeholder="Email" value="test@example.com">
            <input type="password" id="password" placeholder="Password" value="password">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" style="flex:1" onclick="doLogin()">Login</button>
                <button class="btn btn-warning" style="flex:1" onclick="hideLoginModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Cookie Modal -->
    <div class="modal" id="cookieModal">
        <div class="modal-content">
            <h3>🍪 Set Cookie Manual</h3>
            <textarea id="cookieInput" rows="5" placeholder="Paste cookie string here..."></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" style="flex:1" onclick="saveCookie()">Save</button>
                <button class="btn btn-warning" style="flex:1" onclick="hideCookieModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        
        window.onload = function() {
            checkStatus();
            setInterval(updateWIB, 1000);
        };
        
        function addLog(msg, type = 'info') {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString('id-ID');
            const emoji = type === 'error' ? '❌' : type === 'success' ? '✅' : '📌';
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `${emoji} ${time} - ${msg}`;
            log.insertBefore(entry, log.firstChild);
            
            if (log.children.length > 10) {
                log.removeChild(log.lastChild);
            }
        }
        
        function updateWIB() {
            const now = new Date();
            const wib = new Date(now.getTime() + (7 * 60 * 60 * 1000));
            document.getElementById('wibTime').textContent = 
                wib.toLocaleString('id-ID', { hour12: false });
        }
        
        async function checkStatus() {
            try {
                addLog('Checking status...');
                const res = await fetch(`${API_BASE}/api/status`);
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('serverStatus').textContent = 'ONLINE';
                    document.getElementById('serverStatus').className = 'online';
                    document.getElementById('cookieCount').textContent = data.status.cookieCount || 0;
                    document.getElementById('smsSent').textContent = data.status.smsSent || 0;
                    addLog('Status OK', 'success');
                }
            } catch (err) {
                document.getElementById('serverStatus').textContent = 'OFFLINE';
                document.getElementById('serverStatus').className = 'offline';
                addLog(`Error: ${err.message}`, 'error');
            }
        }
        
        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }
        
        function hideLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }
        
        async function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            hideLoginModal();
            addLog(`Logging in as ${email}...`);
            
            try {
                const res = await fetch(`${API_BASE}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    addLog(`✅ Login success! Cookies: ${data.cookieCount}`, 'success');
                    checkStatus();
                } else {
                    addLog(`❌ Login failed: ${data.error}`, 'error');
                }
            } catch (err) {
                addLog(`❌ Error: ${err.message}`, 'error');
            }
        }
        
        async function pollSMS() {
            addLog('Polling SMS...');
            
            try {
                const res = await fetch(`${API_BASE}/api/poll`);
                const data = await res.json();
                
                if (data.success) {
                    addLog(`✅ Found ${data.new} new SMS (Total: ${data.total})`, 'success');
                    checkStatus();
                } else {
                    addLog(`❌ Poll failed: ${data.error}`, 'error');
                }
            } catch (err) {
                addLog(`❌ Error: ${err.message}`, 'error');
            }
        }
        
        function showCookieModal() {
            document.getElementById('cookieModal').style.display = 'flex';
        }
        
        function hideCookieModal() {
            document.getElementById('cookieModal').style.display = 'none';
        }
        
        async function saveCookie() {
            const cookie = document.getElementById('cookieInput').value;
            hideCookieModal();
            
            if (!cookie) {
                addLog('❌ Cookie required', 'error');
                return;
            }
            
            addLog('Setting manual cookie...');
            
            try {
                const res = await fetch(`${API_BASE}/api/setcookie`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cookie })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    addLog(`✅ Cookie saved! ${data.count} items`, 'success');
                    checkStatus();
                } else {
                    addLog(`❌ Failed: ${data.error}`, 'error');
                }
            } catch (err) {
                addLog(`❌ Error: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
